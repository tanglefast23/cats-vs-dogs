<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#172b36" />
  <title>Splash Screen Concepts — Cats vs Dogs</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ================= demo shell ================= */
    html, body { height: 100%; overflow: hidden; }
    body { margin: 0; }
    .sc-stage { position: fixed; inset: 0; overflow: hidden; }

    .sc-switcher { position: fixed; top: 10px; left: 50%; translate: -50% 0; display: flex; gap: 8px; z-index: 90; }
    .sc-switcher button {
      font-family: var(--px); font-size: 8px; letter-spacing: 1px; padding: 9px 11px;
      border: 2px solid var(--ink); background: rgba(255,248,220,.88); color: var(--ink);
      box-shadow: 2px 2px 0 rgba(8,23,30,.85); cursor: pointer;
    }
    .sc-switcher button[aria-pressed="true"] { background: var(--amber); }
    .sc-caption {
      position: fixed; left: 12px; top: 10px; z-index: 90; margin: 0; max-width: 40ch;
      font-family: var(--px); font-size: 8px; line-height: 1.7; color: #cfe3da;
      background: rgba(11,28,36,.78); border: 2px solid var(--ink); padding: 8px 10px;
      box-shadow: 2px 2px 0 rgba(8,23,30,.85);
    }

    /* ================= shared splash chrome ================= */
    .sc-title { position: absolute; top: 8vh; left: 0; right: 0; z-index: 30; text-align: center; pointer-events: none; }
    .sc-eyebrow {
      margin: 0 0 16px; font-family: var(--px); font-size: 10px; letter-spacing: 4px;
      color: #ffcf5d; text-shadow: 2px 2px 0 rgba(23,43,54,.95);
    }
    .sc-title h1 {
      margin: 0; font-family: var(--px); font-weight: 400;
      font-size: clamp(30px, 5.6vw, 54px); line-height: 1.15; color: var(--paper);
      text-shadow: 4px 4px 0 var(--ink), 8px 8px 0 rgba(8,23,30,.45);
    }
    .sc-title h1 .vs {
      display: inline-block; margin: 0 .35ch; font-size: .55em; color: var(--orange);
      text-shadow: 3px 3px 0 var(--ink); animation: sc-vs-pulse 2.6s ease-in-out infinite;
    }
    @keyframes sc-vs-pulse { 0%, 78%, 100% { scale: 1; } 86% { scale: 1.18; } 92% { scale: .96; } }

    .sc-menu {
      position: absolute; left: 50%; top: 40%; translate: -50% 0; z-index: 30;
      display: grid; gap: 16px; width: min(320px, 78vw);
    }
    .sc-btn {
      border: 3px solid var(--ink); background: var(--paper); color: var(--ink);
      font-family: var(--px); font-size: 12px; letter-spacing: 1px; padding: 16px 12px;
      box-shadow: 5px 5px 0 rgba(8,23,30,.9); cursor: pointer;
    }
    .sc-btn:hover { background: #fff3b8; }
    .sc-btn.primary {
      background: var(--orange); color: #fff9db; text-shadow: 2px 2px 0 var(--orange-dark);
      font-size: 15px; padding: 20px 12px;
    }
    .sc-btn.primary:hover { background: #f28a45; }

    canvas.sc-sprite { display: block; image-rendering: pixelated; filter: drop-shadow(2px 3px 0 rgba(17,38,32,.45)); }
    canvas.sc-sprite.flip { transform: scaleX(-1); }

    .sc-star { position: absolute; z-index: 1; background: #ffefc4; animation: sc-twinkle var(--d, 3s) linear var(--del, 0s) infinite; }
    @keyframes sc-twinkle { 0%, 100% { opacity: .12; } 50% { opacity: .85; } }

    /* ================= concept 1 · the standoff ================= */
    .sc-grass {
      position: absolute; left: 0; right: 0; bottom: 0; height: 30vh; z-index: 2;
      border-top: 4px solid var(--ink);
      background-image:
        linear-gradient(180deg, rgba(11,28,36,.30), rgba(11,28,36,0) 34%),
        conic-gradient(#82ad55 25%, #77a64e 0 50%, #82ad55 0 75%, #77a64e 0);
      background-size: 100% 100%, 56px 56px;
    }
    .sc-pet {
      position: absolute; z-index: var(--z, 5);
      animation: sc-idle var(--idur, 1.2s) ease-in-out var(--idel, 0s) infinite;
    }
    @keyframes sc-idle { 0%, 100% { translate: 0 0; } 50% { translate: 0 -4px; } }
    .sc-pet.taunt { animation: sc-taunt .68s cubic-bezier(.3, 1.4, .5, 1) 1; }
    @keyframes sc-taunt {
      0%   { translate: 0 0; rotate: 0deg; }
      35%  { translate: calc(var(--dir, 1) * 22px) -16px; rotate: calc(var(--dir, 1) * 7deg); }
      60%  { translate: calc(var(--dir, 1) * 12px) 0; rotate: 0deg; }
      100% { translate: 0 0; rotate: 0deg; }
    }
    .sc-vs {
      position: absolute; left: 50%; bottom: 8vh; translate: -50% 0; z-index: 9; rotate: -4deg;
      width: 64px; height: 64px; display: grid; place-items: center;
      background: var(--amber); border: 3px solid var(--ink); box-shadow: 5px 5px 0 rgba(8,23,30,.9);
      font-family: var(--px); font-size: 21px; color: var(--ink);
      animation: sc-vs-shake 3.4s ease-in-out infinite;
    }
    @keyframes sc-vs-shake {
      0%, 84%, 100% { rotate: -4deg; }
      88% { rotate: 4deg; } 92% { rotate: -7deg; } 96% { rotate: 2deg; }
    }
    .sc-spark { position: absolute; z-index: 9; width: 9px; height: 9px; background: #ffe56e; animation: sc-spark 1.7s steps(2) var(--del, 0s) infinite; }
    @keyframes sc-spark { 0%, 55% { opacity: 0; scale: .4; } 60%, 82% { opacity: 1; scale: 1; } 100% { opacity: 0; scale: .4; } }

    /* ================= concept 2 · fence peekaboo ================= */
    .sc-fence {
      position: absolute; left: 0; right: 0; bottom: 0; height: 24vh; z-index: 10;
      border-top: 4px solid var(--ink);
      background-image:
        linear-gradient(180deg, rgba(23,43,54,.22), rgba(23,43,54,0) 26%),
        repeating-linear-gradient(90deg, #c98d58 0 10px, #b97d4e 10px 46px, #8a5a38 46px 50px);
    }
    .sc-fence::before {
      content: ''; position: absolute; left: 0; right: 0; top: 14%; height: 16px;
      background: #d6ab70; border-top: 3px solid var(--ink); border-bottom: 3px solid var(--ink);
    }
    .sc-slot { position: absolute; z-index: 5; }
    .sc-pop { translate: 0 135%; }
    .sc-slot.up .sc-pop {
      animation:
        sc-pop-up .5s cubic-bezier(.2, 1.5, .4, 1) forwards,
        sc-pop-sway 1.7s ease-in-out .5s infinite;
    }
    @keyframes sc-pop-up { from { translate: 0 135%; } to { translate: 0 0; } }
    @keyframes sc-pop-sway { 0%, 100% { rotate: -3deg; } 50% { rotate: 3deg; } }
    .sc-slot.down .sc-pop { animation: sc-pop-down .3s cubic-bezier(.5, 0, .8, .4) forwards; }
    @keyframes sc-pop-down { from { translate: 0 0; } to { translate: 0 135%; } }
    .sc-peek { position: absolute; z-index: 12; translate: var(--hx, -110%) 0; rotate: 0deg; transition: translate .45s cubic-bezier(.2, 1.3, .4, 1), rotate .45s ease; }
    .sc-peek.in { translate: 0 0; rotate: var(--tilt, 8deg); }
    .sc-shout {
      position: absolute; z-index: 14; font-family: var(--px); font-size: 13px; color: var(--ink);
      background: var(--paper); border: 2px solid var(--ink); padding: 5px 7px;
      box-shadow: 3px 3px 0 rgba(8,23,30,.85); animation: sc-shout .95s ease-out forwards; pointer-events: none;
    }
    @keyframes sc-shout {
      0% { opacity: 0; translate: 0 10px; } 15% { opacity: 1; }
      78% { opacity: 1; translate: 0 -14px; } 100% { opacity: 0; translate: 0 -22px; }
    }

    /* ================= concept 3 · the backyard chase ================= */
    .sc-field {
      position: absolute; left: 0; right: 0; bottom: 0; height: 32vh; z-index: 2;
      border-top: 4px solid var(--ink);
      background-image:
        linear-gradient(180deg, rgba(11,28,36,.42), rgba(11,28,36,0) 40%),
        conic-gradient(#82ad55 25%, #77a64e 0 50%, #82ad55 0 75%, #77a64e 0);
      background-size: 100% 100%, 56px 56px;
    }
    .sc-moon { position: absolute; top: 7vh; right: 9vw; z-index: 1; image-rendering: pixelated; opacity: .95; }
    .sc-fly {
      position: absolute; z-index: 3; width: 4px; height: 4px; background: #ffd964;
      box-shadow: 0 0 7px 2px rgba(255,217,100,.55);
      animation: sc-fly var(--d, 4s) ease-in-out infinite alternate, sc-twinkle 1.9s linear var(--del, 0s) infinite;
    }
    @keyframes sc-fly { from { translate: 0 0; } to { translate: var(--dx, 40px) var(--dy, -20px); } }
    .sc-chase {
      position: absolute; left: 0; bottom: var(--lane-b, 4px); z-index: var(--z, 5);
      display: flex; align-items: flex-end; gap: var(--gap, 40px); filter: var(--dim, none);
      animation: sc-run-x var(--dur, 5s) linear forwards;
    }
    @keyframes sc-run-x { from { translate: -45vw 0; } to { translate: 115vw 0; } }
    .sc-chase.rev { animation-name: sc-run-x-rev; }
    @keyframes sc-run-x-rev { from { translate: 115vw 0; } to { translate: -45vw 0; } }
    .sc-runner { position: relative; animation: sc-gallop var(--gdur, .34s) ease-in-out infinite; }
    @keyframes sc-gallop { 0%, 100% { translate: 0 0; rotate: 0deg; } 50% { translate: 0 -7px; rotate: var(--lean, 4deg); } }
    .sc-runner::after {
      content: ''; position: absolute; bottom: 3px; width: 7px; height: 5px;
      background: #d9cba0; animation: sc-dust .42s linear infinite;
    }
    .sc-chase:not(.rev) .sc-runner::after { left: -11px; --dustdir: -1; }
    .sc-chase.rev .sc-runner::after { right: -11px; --dustdir: 1; }
    @keyframes sc-dust {
      0% { opacity: .85; scale: 1; translate: 0 0; }
      100% { opacity: 0; scale: .3; translate: calc(var(--dustdir, -1) * 9px) -7px; }
    }
    .sc-disc {
      position: absolute; z-index: 3; width: 30px; height: 10px;
      background: #53c7ef; border: 2px solid var(--ink); box-shadow: inset 0 3px 0 #d9f8ff;
      animation: sc-disc var(--dur, 5s) linear forwards;
    }
    @keyframes sc-disc {
      0%   { translate: -10vw 0; rotate: 0deg; }
      50%  { translate: 50vw -13vh; rotate: -14deg; }
      100% { translate: 112vw -6vh; rotate: -30deg; }
    }

    @media (max-height: 560px) {
      .sc-title { top: 5vh; }
      .sc-menu { top: 36%; gap: 10px; }
      .sc-btn { padding: 12px 10px; font-size: 11px; }
      .sc-btn.primary { padding: 15px 10px; font-size: 13px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .sc-pet, .sc-vs, .sc-spark, .sc-star, .sc-fly, .sc-runner, .sc-title h1 .vs,
      .sc-slot.up .sc-pop, .sc-runner::after { animation-duration: .001s !important; animation-iteration-count: 1 !important; }
    }
  </style>
</head>
<body>
  <div id="stage" class="sc-stage"></div>
  <nav id="switcher" class="sc-switcher" aria-label="Concept switcher"></nav>
  <p id="caption" class="sc-caption"></p>
  <script type="module" src="src/splash-concepts.js"></script>
</body>
</html>
